<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Claudecraft Bros. — a WoC side-scroller</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#7ec0ee;font-family:ui-monospace,Consolas,monospace;color:#fff}
  #cv{position:fixed;top:0;left:0;display:block;width:100vw;height:100vh}
  #hud{position:fixed;top:12px;left:16px;font-size:18px;text-shadow:2px 2px 0 #0006;letter-spacing:.03em;z-index:3}
  #hud b{font-weight:700}
  #msg{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:.6rem;text-align:center;z-index:4;background:#0007}
  #msg h1{font-size:clamp(28px,6vw,56px);margin:0;text-shadow:3px 3px 0 #0007}
  #msg button{font:inherit;font-size:18px;color:#222;background:#ffd34d;border:0;border-radius:8px;
    padding:.6rem 1.8rem;cursor:pointer;box-shadow:0 4px 0 #c99a1e}
  #msg button:active{transform:translateY(3px);box-shadow:0 1px 0 #c99a1e}
  #load{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:1rem;background:#1a1030;z-index:5}
  #load .bar{width:min(60vw,320px);height:10px;border:1px solid #fff6;border-radius:6px;overflow:hidden}
  #load .fill{height:100%;width:0;background:#ffd34d;transition:width .2s}
  #load .t{letter-spacing:.25em;text-transform:uppercase;font-size:.75rem;opacity:.7}
  #ctl{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);opacity:.55;font-size:.72rem;z-index:3;text-shadow:1px 1px 0 #0006}
  #toast{position:fixed;top:26%;left:50%;transform:translateX(-50%);z-index:4;opacity:0;transition:opacity .3s;
    font-size:clamp(28px,7vw,54px);font-weight:700;letter-spacing:.06em;text-shadow:3px 3px 0 #0007;pointer-events:none}
  /* fullscreen toggle */
  #fs{position:fixed;top:10px;right:12px;z-index:7;width:44px;height:44px;font:inherit;font-size:20px;
    background:#0006;color:#fff;border:1px solid #fff4;border-radius:8px;cursor:pointer;line-height:1}
  #fs:active{background:#fff3;color:#111}
  /* NES-style touch controls (mobile / portrait) */
  #touch{position:fixed;left:0;right:0;bottom:0;display:none;justify-content:space-between;align-items:flex-end;
    padding:0 20px calc(20px + env(safe-area-inset-bottom));z-index:7;pointer-events:none}
  #touch .cluster{pointer-events:none;display:flex;gap:16px;align-items:center}
  .tb{pointer-events:auto;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
    width:72px;height:72px;border-radius:50%;border:2px solid #ffffff66;background:#00000055;color:#fff;
    font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
  .tb:active{background:#ffffff55;color:#111;transform:scale(.94)}
  .tb.jump{width:98px;height:98px;font-size:20px;background:#c0392baa;border-color:#ffffffaa}
  .tb.atk{background:#2e64c9aa;border-color:#ffffffaa;font-size:30px}
  body.touch #touch{display:flex}
  body.touch #ctl{display:none}
  /* portrait: split the screen — game on top, controller panel on the bottom */
  @media (orientation: portrait){
    body.touch #cv{ height: 64vh; }
    body.touch #hud{ }
    body.touch #touch{ top:auto; height:36vh; align-items:center;
      background:linear-gradient(#1a1330,#0d0a1a); border-top:3px solid #35285a;
      box-shadow:inset 0 3px 12px #0008; padding-bottom:calc(14px + env(safe-area-inset-bottom)); }
    body.touch .tb{ width:78px; height:78px; }
    body.touch .tb.jump{ width:104px; height:104px; }
  }
</style>
<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud"><b>◎</b> <span id="coins">0</span> &nbsp;·&nbsp; <b>♥</b> <span id="lives">3</span> &nbsp;·&nbsp; <b>⚑</b> <span id="lvl">1</span></div>
<div id="toast"></div>
<div id="ctl">← → / A D · move &nbsp; SPACE / ↑ · jump &nbsp; J · attack &nbsp; or stomp the boars</div>
<div id="load"><div class="t">Loading Eastbrook Vale…</div><div class="bar"><div class="fill" id="lf"></div></div><div class="t" id="lt" style="opacity:.4"></div></div>
<div id="msg"><h1 id="mt"></h1><button id="mb">Play again</button></div>
<button id="fs" aria-label="Toggle fullscreen" title="Fullscreen">⛶</button>
<div id="touch">
  <div class="cluster">
    <button class="tb" data-k="ArrowLeft" aria-label="Left">◀</button>
    <button class="tb" data-k="ArrowRight" aria-label="Right">▶</button>
  </div>
  <div class="cluster">
    <button class="tb atk" data-k="attack" aria-label="Attack">⚔</button>
    <button class="tb jump" data-k="Space" aria-label="Jump">JUMP</button>
  </div>
</div>
<script>
// Surface any error on-screen (module-load errors, model failures) instead of a blank page.
(function(){
  function show(m){ var t=document.getElementById('lt'); if(t){ t.style.opacity='1'; t.style.color='#ff9a9a'; t.textContent=String(m).slice(0,220); } }
  addEventListener('error', e=>{ show('ERROR: '+(e.message||(e.error&&e.error.message)||'script/module failed to load')); }, true);
  addEventListener('unhandledrejection', e=>{ show('ERROR: '+((e.reason&&e.reason.message)||e.reason||'promise rejected')); });
})();
</script>
<script type="module">
// Dynamic imports so a load/resolve failure gives a REAL error message
// (static imports fail opaquely as cross-origin "Script error.").
function fail(m){ const t=document.getElementById('lt'); if(t){ t.style.opacity='1'; t.style.color='#ff9a9a'; t.textContent=String(m).slice(0,260);} const d=document.getElementById('load'); if(d) d.style.display='flex'; }
let THREE, GLTFLoader, skClone, MeshoptDecoder;
try {
  THREE = await import('three');
  GLTFLoader = (await import('three/addons/loaders/GLTFLoader.js')).GLTFLoader;
  skClone   = (await import('three/addons/utils/SkeletonUtils.js')).clone;
  MeshoptDecoder = (await import('three/addons/libs/meshopt_decoder.module.js')).MeshoptDecoder;
} catch (e) {
  fail('THREE import failed: ' + (e && (e.message||e)) );
  throw e;
}

const BASE = 'https://cdn.jsdelivr.net/gh/levy-street/world-of-claudecraft@v0.25.0/public/models/';
const cv = document.getElementById('cv');
const renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true });
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ec0ee);
scene.fog = new THREE.Fog(0x7ec0ee, 40, 90);

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 200);
function resize(){
  const w = cv.clientWidth || innerWidth, h = cv.clientHeight || innerHeight;
  camera.aspect = w/h; camera.updateProjectionMatrix();
  renderer.setSize(w, h, false); // false: canvas CSS size is controlled by layout
}
addEventListener('resize', resize);
addEventListener('orientationchange', ()=> setTimeout(resize, 120));
document.addEventListener('fullscreenchange', ()=> setTimeout(resize, 120));
resize();

// lights
scene.add(new THREE.HemisphereLight(0xcfe8ff, 0x4a6b3a, 1.05));
const sun = new THREE.DirectionalLight(0xfff2d0, 1.5);
sun.position.set(-8, 20, 12); sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048); sun.shadow.camera.near=1; sun.shadow.camera.far=80;
const sc = sun.shadow.camera; sc.left=-40; sc.right=40; sc.top=30; sc.bottom=-20;
scene.add(sun); scene.add(sun.target);

// weapon-swing slash effect (a white arc that flashes in front of the hero)
const slashMat = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0, side:THREE.DoubleSide });
const slashMesh = new THREE.Mesh(new THREE.RingGeometry(0.9, 1.7, 20, 1, -0.7, 1.4), slashMat);
slashMesh.visible=false; scene.add(slashMesh);

// ---------- levels ----------
const groundMat = new THREE.MeshStandardMaterial({ color: 0x6c8f4a, roughness: 1 });
const brickMat  = new THREE.MeshStandardMaterial({ color: 0x9c6b3f, roughness: 1 });
const blockMat  = new THREE.MeshStandardMaterial({ color: 0xd7b04a, roughness: .7, metalness:.15, emissive:0x2a2008 }); // hittable brick
const DEPTH = 4;

// persistent parallax hills
for (let i=0;i<70;i++){ const h = new THREE.Mesh(new THREE.ConeGeometry(6+Math.sin(i)*2, 8, 5),
    new THREE.MeshStandardMaterial({color:0x5a7d55})); h.position.set(i*8 - 10, -2, -18 - (i%3)*6); scene.add(h); }

// plats:[x,y(top),w]  bricks:[x,y]  coins:[x,y]  boars:[x,y,lo,hi]  end:flag-x
const LEVELS = [
  { end:150,
    plats:[[-4,0,30],[30,0,22],[58,0,40],[104,0,52],[20,4.2,5],[40,5,6],[66,5.5,7],[90,4.5,6],[112,5,6],[134,4.5,8]],
    bricks:[[25.5,4.6],[27,4.6],[78,6.6],[124,6.6]],
    coins:[[16,2],[26,6.5],[41,6.3],[48,2],[62,2],[67,7],[91,5.8],[100,2],[113,6.3],[135,5.8],[120,2],[140,2]],
    boars:[[40,0,36,46],[70,0,58,96],[110,0,104,146]] },
  { end:158,  // gaps all 8 wide (single-jump ≈9.8), stones ≤4.5 high
    plats:[[-4,0,20],[24,0,12],[44,0,16],[68,0,16],[92,0,20],[120,0,44],[16,4,4],[52,4.5,5],[100,4.5,5]],
    bricks:[[36,4.2],[37.5,4.2],[84,4.6],[112,5],[113.5,5]],
    coins:[[10,2],[18,5.5],[30,2],[48,2],[52,6],[60,2],[76,2],[84,6],[96,2],[100,6],[112,6.5],[130,2],[145,2],[152,2]],
    boars:[[50,0,44,60],[100,0,92,112],[140,0,120,154]] },
  { end:170,  // 12-wide first gap bridged by the stone at x15; the rest ≤8; stones ≤4.5
    plats:[[-4,0,14],[22,0,8],[38,0,8],[54,0,10],[72,0,10],[90,0,10],[108,0,10],[126,0,44],
           [15,4,3],[30,4.5,4],[46,4,4],[64,4.5,4],[82,4,4],[100,4.5,4],[118,4,4]],
    bricks:[[30,5],[64,5],[82,5],[118,5],[150,4.5],[151.5,4.5]],
    coins:[[8,2],[22,2],[30,6],[38,2],[46,5.5],[54,2],[64,6],[72,2],[82,5.5],[90,2],[100,6],[108,2],[118,5.5],[140,2],[160,2],[165,2]],
    boars:[[54,0,54,64],[96,0,90,106],[145,0,126,166]] },
];

let platforms=[], bricks=[], coins=[], boars=[], pops=[], goalX=0, level=0;
const levelGroup = new THREE.Group(); scene.add(levelGroup);
let coinSrc, boarSrc, boarClips=[];

function buildLevel(i){
  level = i;
  while(levelGroup.children.length) levelGroup.remove(levelGroup.children[0]);
  platforms=[]; bricks=[]; coins=[]; boars=[]; pops=[];
  const L = LEVELS[i]; goalX = L.end - 4;
  const lvlEl = document.getElementById('lvl'); if(lvlEl) lvlEl.textContent = (i+1);
  // platforms
  for(const [x,y,w] of L.plats){ platforms.push({x,y,w});
    const thick = y<=0.01?6:1.1;
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,thick,DEPTH), y<=0.01?groundMat:brickMat);
    m.position.set(x+w/2, y-thick/2, 0); m.receiveShadow=true; m.castShadow=y>0.01; levelGroup.add(m); }
  // hittable bricks — also solid to stand on
  for(const [x,y] of (L.bricks||[])){ const w=1.4; platforms.push({x:x-w/2, y:y+0.7, w});
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,1.4,DEPTH*0.9), blockMat.clone());
    m.position.set(x,y,0); m.castShadow=true; m.receiveShadow=true; levelGroup.add(m);
    bricks.push({x, y, w, mesh:m, top:y+0.7, bottom:y-0.7, used:false, bump:0}); }
  // goal flag
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,8,8), new THREE.MeshStandardMaterial({color:0xdddddd}));
  pole.position.set(goalX,4,0); pole.castShadow=true; levelGroup.add(pole);
  const flag=new THREE.Mesh(new THREE.PlaneGeometry(2.4,1.4), new THREE.MeshStandardMaterial({color:0xd23b3b,side:THREE.DoubleSide}));
  flag.position.set(goalX+1.2,7,0); levelGroup.add(flag);
  // coins
  for(const [x,y] of L.coins){ const grp=new THREE.Group(); grp.add(skClone(coinSrc)); grp.position.set(x,y+0.5,0);
    grp.traverse(n=>{if(n.isMesh)n.castShadow=true;}); levelGroup.add(grp); coins.push({obj:grp,x,y:y+0.9,got:false}); }
  // boars
  for(const [x,y,lo,hi] of L.boars){ const b=skClone(boarSrc); const grp=new THREE.Group(); grp.add(b); grp.position.set(x,y,0);
    grp.traverse(n=>{if(n.isMesh)n.castShadow=true;}); levelGroup.add(grp);
    let bmx=null; if(boarClips.length){ bmx=new THREE.AnimationMixer(b); const wc=pickClip(boarClips,/walk|run|idle/i)||boarClips[0]; bmx.clipAction(wc).play(); }
    boars.push({obj:grp,x,y,lo,hi,dir:-1,mx:bmx,dead:false,tip:0}); }
  // reset hero to the start
  state.x=0; state.y=6; state.vx=0; state.vy=0; state.cpX=0; state.cpY=6; state.won=false; state.invuln=0.6; state.jumps=0; state.jumpHeld=false;
  camera.position.set(2,9.5,21);
  if(i>0) toast('Level '+(i+1));
}

function popCoin(x,y){ const grp=new THREE.Group(); grp.add(skClone(coinSrc)); grp.position.set(x,y+0.4,0.5); levelGroup.add(grp);
  pops.push({grp, vy:7, t:0.55}); }

let toastT=0;
function toast(txt){ const el=document.getElementById('toast'); if(!el) return; el.textContent=txt; el.style.opacity='1'; toastT=1.3; }

// ---------- loading ----------
const loader = new GLTFLoader();
loader.setMeshoptDecoder(MeshoptDecoder); // WoC GLBs are meshopt-compressed
const lf = document.getElementById('lf'), lt = document.getElementById('lt');
function load(url){ return new Promise((res,rej)=> loader.load(url, res, undefined, rej)); }
function fitHeight(obj, targetH){
  const box = new THREE.Box3().setFromObject(obj); const size = new THREE.Vector3(); box.getSize(size);
  const s = targetH / (size.y || 1); obj.scale.setScalar(s);
  const box2 = new THREE.Box3().setFromObject(obj); obj.position.y -= box2.min.y; // feet to 0
  return s;
}
function pickClip(clips, re){ return clips.find(c=>re.test(c.name)); }
function enableShadows(o){ o.traverse(n=>{ if(n.isMesh){ n.castShadow=true; n.frombox=true; } }); }

const assets = {};
async function boot(){
  const steps = [
    ['knight', BASE+'chars/players/knight.glb'],
    ['boar',   BASE+'creatures/wild_boar.glb'],
    ['coin',   BASE+'dungeon/coin.glb'],
  ];
  let done=0;
  for (const [k,u] of steps){ lt.textContent=k; assets[k]=await load(u); lf.style.width=(++done/steps.length*100)+'%'; }
  start();
}
boot().catch(e=>{ lt.textContent='load failed: '+e.message; console.error(e); });

// ---------- entities ----------
const clock = new THREE.Clock();
let player, mixer, actions={}, current=null;
const state = { x: 0, y: 6, vx:0, vy:0, onGround:false, dir:1, coins:0, lives:3, dead:false, won:false, invuln:0, cpX:0, cpY:6, jumps:0, jumpHeld:false };
let attackCD=0, attacking=0, slashT=0;

function play(name){ const a = actions[name]; if(!a || current===a) return;
  a.reset().fadeIn(0.18).play(); if(current) current.fadeOut(0.18); current=a; }

function start(){
  // player
  const g = assets.knight; player = g.scene;
  fitHeight(player, 1.7); enableShadows(player);
  const holder = new THREE.Group(); holder.add(player); scene.add(holder);
  player.parent.userData.model = player;
  window.__holder = holder;
  mixer = new THREE.AnimationMixer(player);
  const clips = g.animations||[];
  const mk = (re)=>{ const c=pickClip(clips,re); return c? mixer.clipAction(c): null; };
  actions.idle = mk(/idle|stand/i) || (clips[0]&&mixer.clipAction(clips[0]));
  actions.run  = mk(/run|jog|walk|sprint/i) || actions.idle;
  actions.jump = mk(/jump|fall|air/i) || actions.idle;
  actions.attack = mk(/attack|slash|swing|melee|strike|cast|ability|1h|sword/i);
  if(actions.idle){ current=actions.idle; actions.idle.play(); }

  // sources for per-level cloning
  coinSrc = assets.coin.scene; fitHeight(coinSrc, 0.9);
  boarSrc = assets.boar.scene; fitHeight(boarSrc, 1.1); boarClips = assets.boar.animations||[];

  buildLevel(0);
  document.getElementById('load').style.display='none';
  loop();
}

// ---------- input ----------
const keys={};
addEventListener('keydown',e=>{ keys[e.code]=true; if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if(e.code==='KeyJ'||e.code==='KeyF'||e.code==='KeyX') doAttack(); });
addEventListener('keyup',e=>{ keys[e.code]=false; });
document.getElementById('mb').onclick=()=>location.reload();

// fullscreen toggle
const fsBtn = document.getElementById('fs');
fsBtn.onclick = () => {
  const el = document.documentElement;
  if (document.fullscreenElement) (document.exitFullscreen||document.webkitExitFullscreen).call(document);
  else (el.requestFullscreen||el.webkitRequestFullscreen)?.call(el);
};
document.addEventListener('fullscreenchange', ()=>{ fsBtn.textContent = document.fullscreenElement ? '⤢' : '⛶'; });

// on-screen NES-style controls — drive the same key flags the game reads
if (matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window){ document.body.classList.add('touch'); resize(); }
for (const b of document.querySelectorAll('.tb')){
  const k = b.getAttribute('data-k');
  b.addEventListener('contextmenu', e=>e.preventDefault());
  if(k==='attack'){ b.addEventListener('pointerdown', e=>{ e.preventDefault(); doAttack(); }); continue; }
  const set = v => e => { e.preventDefault(); keys[k] = v; };
  b.addEventListener('pointerdown', set(true));
  b.addEventListener('pointerup', set(false));
  b.addEventListener('pointerleave', set(false));
  b.addEventListener('pointercancel', set(false));
}

// ---------- physics helpers ----------
const GRAV=-31, MOVE=8.2, JUMP=18.5;
function groundYAt(x, feetY){
  // highest platform top at or below feet (within a small step) under x
  let best=-Infinity;
  for(const p of platforms){ if(x>=p.x-0.4 && x<=p.x+p.w+0.4){ if(p.y<=feetY+0.35 && p.y>best) best=p.y; } }
  return best;
}
function solidTopUnder(x){ let best=-Infinity; for(const p of platforms){ if(x>=p.x && x<=p.x+p.w && p.y>best) best=p.y; } return best; }

function endGame(win){ if(state.won||state.dead) return; state[win?'won':'dead']=true;
  document.getElementById('mt').textContent = win?'🏆 The Vale is saved!':'💀 Game Over';
  document.getElementById('msg').style.display='flex'; }

// ---------- loop ----------
function loop(){
  requestAnimationFrame(loop);
  const dt = Math.min(0.033, clock.getDelta());
  if(!state.dead && !state.won) update(dt);
  if(mixer) mixer.update(dt);
  for(const b of boars) if(b.mx) b.mx.update(dt);
  for(const c of coins) if(!c.got){ c.obj.rotation.y += dt*3; }
  renderer.render(scene,camera);
}

function update(dt){
  state.invuln=Math.max(0,state.invuln-dt);
  // horizontal
  let ax=0; if(keys['ArrowLeft']||keys['KeyA']) ax-=1; if(keys['ArrowRight']||keys['KeyD']) ax+=1;
  state.vx = ax*MOVE;
  if(ax!==0) state.dir=ax;
  state.x += state.vx*dt;
  if(state.x<-4) state.x=-4;
  // jump (grounded jump + one air/double jump), edge-triggered
  const wantJump = keys['Space']||keys['ArrowUp']||keys['KeyW'];
  if(state.onGround) state.jumps=0;
  if(wantJump && !state.jumpHeld && state.jumps<2){ state.vy = state.jumps===0 ? JUMP : JUMP*0.92; state.jumps++; state.onGround=false; }
  state.jumpHeld = wantJump;
  // gravity
  state.vy += GRAV*dt; state.y += state.vy*dt;
  // head-bonk hittable bricks: stop rising, bump the brick, pop a coin
  if(state.vy>0){ const head=state.y+1.72, prevHead=head-state.vy*dt;
    for(const br of bricks){ if(state.x>br.x-br.w/2-0.3 && state.x<br.x+br.w/2+0.3 && head>=br.bottom && prevHead<br.bottom+0.02){
      state.vy=-2; state.y=Math.min(state.y, br.bottom-1.73); br.bump=0.18;
      if(!br.used){ br.used=true; state.coins++; document.getElementById('coins').textContent=state.coins; popCoin(br.x,br.top); }
      break; } }
  }
  // land
  const gy = groundYAt(state.x, state.y);
  if(state.vy<=0 && gy>-Infinity && state.y<=gy+0.02){ state.y=gy; state.vy=0; state.onGround=true; state.cpX=state.x; state.cpY=state.y; }
  else state.onGround=false;
  // fell in a pit → lose a life and respawn at the last safe ground (or game over)
  if(state.y<-6){ hurt(true); }

  // attack timers / anim
  attackCD=Math.max(0,attackCD-dt); if(attacking>0) attacking-=dt;
  if(slashT>0){ slashT-=dt; slashMesh.visible=true;
    slashMesh.position.set(state.x+state.dir*1.3, state.y+0.9, 0.6);
    slashMesh.rotation.z = state.dir>0 ? -0.3 : Math.PI+0.3;
    slashMesh.scale.setScalar(1 + (0.18-slashT)*5); slashMat.opacity = Math.max(0, slashT/0.18);
    if(slashT<=0) slashMesh.visible=false; }

  // brick bumps, coin pops, level toast
  for(const br of bricks){ if(br.bump>0){ br.bump-=dt; br.mesh.position.y = br.y + Math.max(0,Math.sin(br.bump/0.18*Math.PI))*0.35; } }
  for(let i=pops.length-1;i>=0;i--){ const p=pops[i]; p.t-=dt; p.vy-=20*dt; p.grp.position.y+=p.vy*dt; p.grp.rotation.y+=dt*9;
    if(p.t<=0){ levelGroup.remove(p.grp); pops.splice(i,1); } }
  if(toastT>0){ toastT-=dt; if(toastT<=0){ const el=document.getElementById('toast'); if(el) el.style.opacity='0'; } }

  // anim select (attack anim holds while attacking)
  if(attacking>0){ /* keep attack pose */ }
  else if(!state.onGround) play('jump'); else if(Math.abs(state.vx)>0.1) play('run'); else play('idle');

  // place player
  const holder = window.__holder;
  holder.position.set(state.x, state.y, 0);
  holder.rotation.y = state.dir>0 ? Math.PI/2 : -Math.PI/2; // face travel direction

  // coins
  for(const c of coins){ if(c.got) continue;
    if(Math.abs(c.x-state.x)<0.9 && Math.abs(c.y-(state.y+0.9))<1.1){ c.got=true; c.obj.visible=false; state.coins++; document.getElementById('coins').textContent=state.coins; } }

  // boars
  for(const b of boars){ if(b.dead){ b.tip+=dt; b.obj.rotation.z = Math.min(Math.PI/2, b.tip*4); b.obj.position.y = b.y - b.tip*2; continue; }
    b.x += b.dir*2.2*dt; if(b.x<b.lo){b.x=b.lo;b.dir=1;} if(b.x>b.hi){b.x=b.hi;b.dir=-1;}
    b.y = solidTopUnder(b.x); if(b.y===-Infinity) b.y=0;
    b.obj.position.set(b.x,b.y,0); b.obj.rotation.y = b.dir>0?Math.PI/2:-Math.PI/2;
    // collision with player
    const dx=Math.abs(b.x-state.x), dyFeet=state.y-(b.y+0.9);
    if(dx<0.95 && Math.abs(state.y-b.y)<1.6){
      if(state.vy<0 && state.y > b.y+0.5){ b.dead=true; state.vy=JUMP*0.7; }        // stomp
      else if(state.invuln<=0){ hurt(false); state.vx=0; state.x-=state.dir*0.6; }   // hit
    }
  }

  // goal → next level, or win after the last
  if(state.x>=goalX-0.6){ if(level < LEVELS.length-1) buildLevel(level+1); else endGame(true); }

  // camera follow — true side view (no yaw), slight downward pitch
  const camX = state.x + 2*state.dir;
  camera.position.x += (camX - camera.position.x)*0.12;
  camera.position.y += ((state.y+3.5) - camera.position.y)*0.08;
  camera.position.z = 21;
  camera.lookAt(camera.position.x, state.y+1.5, 0);
  sun.position.set(state.x-8,20,12); sun.target.position.set(state.x,0,0);
}

function hurt(pit){ if(state.invuln>0 && !pit) return;
  state.lives--; document.getElementById('lives').textContent=Math.max(0,state.lives);
  state.invuln=1.2;
  if(pit){ // respawn on the last solid ground, not mid-air over the pit
    state.x=state.cpX; state.y=state.cpY+0.4; state.vx=0; state.vy=0;
    camera.position.set(state.x, state.y+3.5, 21); }
  if(state.lives<=0) endGame(false);
}

function doAttack(){ if(attackCD>0 || state.dead || state.won) return;
  attackCD=0.5; attacking=0.34; slashT=0.18;
  if(actions.attack){ actions.attack.reset(); actions.attack.setLoop(THREE.LoopOnce,1); actions.attack.clampWhenFinished=true;
    actions.attack.fadeIn(0.06).play(); if(current && current!==actions.attack) current.fadeOut(0.06); current=actions.attack; }
  for(const b of boars){ if(b.dead) continue; const dx=b.x-state.x;
    if((dx>=0?1:-1)===state.dir && Math.abs(dx)<3.4 && Math.abs(b.y-state.y)<1.9){ b.dead=true; b.tip=0; } }
}
</script>
